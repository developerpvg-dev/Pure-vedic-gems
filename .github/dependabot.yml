version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      next-react:
        patterns:
          - next
          - react
          - react-dom
          - eslint-config-next
      sentry-sanity-supabase:
        patterns:
          - '@sentry/*'
          - '@sanity/*'
          - next-sanity
          - '@supabase/*'