<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 40">
  <!-- Blue background -->
  <rect width="60" height="40" fill="#012169"/>
  <!-- White diagonals (St Andrew + St Patrick background) -->
  <path d="M0,0 L60,40 M60,0 L0,40" stroke="#FFFFFF" stroke-width="10"/>
  <!-- Red diagonals (St Patrick fimbriation) -->
  <path d="M0,0 L60,40 M60,0 L0,40" stroke="#C8102E" stroke-width="4"/>
  <!-- White cross (St George background) -->
  <path d="M30,0 V40 M0,20 H60" stroke="#FFFFFF" stroke-width="13"/>
  <!-- Red cross (St George) -->
  <path d="M30,0 V40 M0,20 H60" stroke="#C8102E" stroke-width="8"/>
</svg>
